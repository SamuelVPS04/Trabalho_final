<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar comum">
        <h2>Área do Usuário</h2>
        <div>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Notícias</a>
            {% if current_user.is_admin() %}
                <a href="{{ url_for('admin_painel') }}" class="btn btn-secondary">Painel Admin</a>
            {% endif %}
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Sair</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 50px;">
        <div class="card">
            <h3>Meu Perfil</h3>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            
            <form action="{{ url_for('editar_perfil') }}" method="POST">
                <div class="form-group">
                    <label>E-mail (Não editável)</label>
                    <input type="email" class="form-control" value="{{ user.email }}" disabled>
                </div>
                
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" class="form-control" value="{{ user.nome }}" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: auto;">Salvar Alterações</button>
            </form>
        </div>
    </div>
</body>
</html>
