<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="card" style="width: 350px;">
        <h3 style="text-align: center;">Acesso ao Sistema</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" class="form-control" required placeholder="admin@exemplo.com">
            </div>
            
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" required placeholder="******">
            </div>
            
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <span>Não tem conta? </span>
            <a href="{{ url_for('cadastro') }}" style="color: #3498db;">Cadastre-se aqui</a>
        </div>
    </div>
</body>
</html>
